# Aktive Production-Config liegt auf dem VPS unter
# /etc/nginx/sites-available/teamwerk (verlinkt aus sites-enabled/).
# Dieses File spiegelt diesen Zustand für Reproduzierbarkeit & setup-vps.sh.

# ── Rate-Limiting (zweite Schicht; primäre liegt im Go-Backend via httprate) ──
# Die limit_req_zone-Direktive MUSS im http{}-Kontext stehen (nicht im server{}).
# Auf dem VPS daher EINMALIG in /etc/nginx/nginx.conf im http{}-Block ergänzen:
#
#   limit_req_zone $binary_remote_addr zone=teamwerk_auth:10m rate=20r/m;
#
# Die Anwendung (limit_req) erfolgt unten in der location für die Auth-Routen.

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name internal.team-stuttgart.org;
    return 301 https://$host$request_uri;
}

# HTTPS server for TeamWERK
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name internal.team-stuttgart.org;

    # Let's Encrypt certificates
    ssl_certificate     /etc/letsencrypt/live/internal.team-stuttgart.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/internal.team-stuttgart.org/privkey.pem;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Gzip compression
    gzip on;
    gzip_types application/json text/css text/javascript;

    # Sicherheitsheader (zweite Schicht; primär gesetzt in der Go-Middleware
    # securityHeaders). „always" sorgt dafür, dass sie auch bei Fehlerantworten
    # gesetzt werden. HSTS erst nach gesichertem Live-Zertifikat aktivieren.
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://matomo.team-stuttgart.org; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://matomo.team-stuttgart.org; media-src 'self' blob:; connect-src 'self' https://matomo.team-stuttgart.org; frame-ancestors 'none'; object-src 'none'; base-uri 'self'" always;
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Globaler Body-Size-Default: deckt Dokumente-Upload (50 MB Backend-Cap) +
    # Photo/SEPA-Single. Bulk-SEPA-Import hat eine eigene location-Override.
    client_max_body_size 50m;

    # Bulk-Import von SEPA-Mandat-PDFs (Verzeichnis-Upload). Backend-Cap: 500 MB.
    location = /api/members/sepa-mandates/import {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host $server_name;
        client_max_body_size 600m;
        proxy_read_timeout 300s;
    }

    # Spielvideo-Upload (tus, resumable). Backend-Cap: 2,5 GiB. Eigene location,
    # weil der globale 50m-Default jeden Chunk >50 MB mit 413 ablehnt und das
    # Default-request_buffering die volle Datei vor Weiterleitung auf Disk
    # puffert (verzögert tusd-Disk-Guard, verdoppelt Disk-IO).
    location /api/videos/upload/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host $server_name;

        client_max_body_size    2700m;
        proxy_request_buffering off;
        proxy_http_version      1.1;
        proxy_read_timeout      3600s;
        proxy_send_timeout      3600s;
    }

    # Bruteforce-/DoS-exponierte Auth-Routen: zweite Rate-Limit-Schicht. burst
    # erlaubt kurze Spitzen (Token-Refresh-Wellen), nodelay lehnt darüber sofort ab.
    # Setzt voraus, dass zone=teamwerk_auth in nginx.conf http{} definiert ist.
    location ~ ^/api/auth/(login|refresh|forgot-password|reset-password)$ {
        limit_req          zone=teamwerk_auth burst=10 nodelay;
        limit_req_status   429;
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host $server_name;
    }

    # Reverse proxy to TeamWERK backend
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host $server_name;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
