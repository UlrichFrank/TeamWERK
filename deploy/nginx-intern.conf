# Aktive Production-Config liegt auf dem VPS unter
# /etc/nginx/sites-available/teamwerk (verlinkt aus sites-enabled/).
# Dieses File spiegelt diesen Zustand für Reproduzierbarkeit & setup-vps.sh.

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name internal.team-stuttgart.org;
    return 301 https://$host$request_uri;
}

# HTTPS server for TeamWERK
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name internal.team-stuttgart.org;

    # Let's Encrypt certificates
    ssl_certificate     /etc/letsencrypt/live/internal.team-stuttgart.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/internal.team-stuttgart.org/privkey.pem;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Gzip compression
    gzip on;
    gzip_types application/json text/css text/javascript;

    # Globaler Body-Size-Default: deckt Dokumente-Upload (50 MB Backend-Cap) +
    # Photo/SEPA-Single. Bulk-SEPA-Import hat eine eigene location-Override.
    client_max_body_size 50m;

    # Bulk-Import von SEPA-Mandat-PDFs (Verzeichnis-Upload). Backend-Cap: 500 MB.
    location = /api/members/sepa-mandates/import {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host $server_name;
        client_max_body_size 600m;
        proxy_read_timeout 300s;
    }

    # Reverse proxy to TeamWERK backend
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host $server_name;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
