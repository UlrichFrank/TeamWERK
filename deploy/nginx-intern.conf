server {
    listen 80;
    server_name intern.team-stuttgart.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name intern.team-stuttgart.org;

    ssl_certificate     /etc/ssl/teamwerk/cert.pem;
    ssl_certificate_key /etc/ssl/teamwerk/key.pem;

    # Globaler Default: deckt Dokumente-Upload (50 MB Backend-Cap) + Photo/SEPA-Single.
    # Bulk-SEPA-Import hat eine eigene location-Override unten.
    client_max_body_size 50m;

    location /api/events {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }

    # Bulk-Import von SEPA-Mandat-PDFs (Verzeichnis-Upload). Backend-Cap: 500 MB.
    location = /api/members/sepa-mandates/import {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 600m;
        proxy_read_timeout 300s;
    }

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
