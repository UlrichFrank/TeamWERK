## Migration 049 (Backfill members.home_club_id). Erstellt aus dem Ist-Stand
## der Prod-DB am 2026-06-20 (165 Mitglieder mit nicht-leerem home_club).
##
## Geprüft von: Vorstand (Ulrich Frank).
## Bei Änderungen an dieser Datei MÜSSEN die beiden Migrationen synchron
## angepasst werden (manueller Doppel-Pflege-Schritt, bewusst nicht
## generiert, damit die Migration reviewbarer Klartext bleibt).
##
## Konvention:
##   - "stammverein" ist exakt der Wert in stammvereine.name (UNIQUE).
