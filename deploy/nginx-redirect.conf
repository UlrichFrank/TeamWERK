# Alt-Host-Nginx-Konfiguration nach dem Server-Umzug:
# Der TeamWERK-Service läuft nicht mehr auf diesem Host — alle Requests
# werden per 301 auf den neuen Standort umgeleitet, damit alte Bookmarks
# und noch nicht aktualisierte PWA-Clients (inkl. /api/*-Calls) sauber
# die neue Origin sehen und dort weiterlaufen.
#
# Platzhalter (werden von `make server-cutover` per sed ersetzt):
#   {{SOURCE_DOMAIN}}  — der alte Hostname, z. B. intern.team-stuttgart.org
#   {{NEW_BASE_URL}}   — vollständige URL des neuen Hosts,
#                        z. B. https://teamwerk.team-stuttgart.org
#
# Die Let's-Encrypt-Zertifikatspfade sind identisch zur bisherigen
# Config — der Cert bleibt so lange gültig, bis er ausläuft; Certbot
# renewt weiter, solange Port 80 offen und die Domain auf diesen Host
# zeigt.

# HTTP → HTTPS und HTTP-Redirect
server {
    listen 80;
    listen [::]:80;
    server_name {{SOURCE_DOMAIN}};

    add_header Cache-Control "no-store" always;
    return 301 {{NEW_BASE_URL}}$request_uri;
}

# HTTPS-Redirect (inkl. /api/*, damit alte PWA-Clients die neue Origin
# als Response bekommen statt Netzwerkfehler)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name {{SOURCE_DOMAIN}};

    ssl_certificate     /etc/letsencrypt/live/{{SOURCE_DOMAIN}}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/{{SOURCE_DOMAIN}}/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Cache-Control "no-store" always;
    return 301 {{NEW_BASE_URL}}$request_uri;
}
