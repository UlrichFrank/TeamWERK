# Optionales zweites, redundantes externes Auge (primär: mittwald-Cron, siehe
# docs/monitoring.md). Pollt /api/healthz und wertet die Signale aus; bei
# Verletzung schlägt der Job fehl → GitHub benachrichtigt.
#
# Hinweis: GitHub-Actions-Cron ist nicht minutengenau (Jitter, gelegentlich
# ausgelassene Ticks). Für harte Latenz das mittwald-Cron nutzen.
#
# Setup: Repo-Variable HEALTHZ_URL setzen (Settings → Secrets and variables →
# Actions → Variables), damit die interne URL nicht im Repo steht.
name: uptime

on:
  schedule:
    - cron: "*/5 * * * *"
    - cron: "17 */6 * * *"   # Cleanup alter Runs alle 6 h
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  healthz:
    if: github.event.schedule != '17 */6 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Poll /api/healthz und Schwellen prüfen
        env:
          HEALTHZ_URL: ${{ vars.HEALTHZ_URL }}
          DISK_MIN: "15"
          SCHED_MAX: "180"
        run: |
          set -euo pipefail
          if [ -z "${HEALTHZ_URL:-}" ]; then
            echo "Repo-Variable HEALTHZ_URL ist nicht gesetzt — übersprungen."
            exit 0
          fi
          code=$(curl -s -o body.json -w '%{http_code}' --max-time 10 "$HEALTHZ_URL" || echo 000)
          echo "HTTP $code"; cat body.json || true
          if [ "$code" != "200" ]; then
            echo "::error::healthz HTTP $code (erwartet 200)"; exit 1
          fi
          db=$(jq -r '.db' body.json)
          disk=$(jq -r '.disk_free_pct' body.json)
          sched=$(jq -r '.scheduler_age_sec' body.json)
          fail=0
          [ "$db" = "ok" ] || { echo "::error::db=$db"; fail=1; }
          if [ "$disk" -ge 0 ] 2>/dev/null && [ "$disk" -lt "$DISK_MIN" ]; then
            echo "::error::disk_free_pct=$disk (< $DISK_MIN)"; fail=1
          fi
          if [ "$sched" -gt "$SCHED_MAX" ] 2>/dev/null; then
            echo "::error::scheduler_age_sec=$sched (> $SCHED_MAX, Cron tot?)"; fail=1
          fi
          exit $fail

  cleanup:
    # Verhindert, dass sich GitHub-Actions-Runs (alle 5 min) unbegrenzt anhäufen.
    # Läuft alle 6 h und löscht Runs dieser Workflow älter als KEEP_HOURS
    # → im Verlauf bleiben ca. ein halber Tag (~144 Runs).
    if: github.event.schedule == '17 */6 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Alte uptime-Runs löschen
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          WORKFLOW: uptime.yml
          KEEP_HOURS: "12"
        run: |
          set -euo pipefail
          cutoff=$(date -u -d "${KEEP_HOURS} hours ago" +%Y-%m-%dT%H:%M:%SZ)
          echo "Lösche Runs von $WORKFLOW älter als $cutoff"
          ids=$(gh api --paginate \
            "repos/${REPO}/actions/workflows/${WORKFLOW}/runs?per_page=100" \
            -q ".workflow_runs[] | select(.created_at < \"${cutoff}\") | .id")
          deleted=0
          for id in $ids; do
            if gh api -X DELETE "repos/${REPO}/actions/runs/${id}" >/dev/null 2>&1; then
              deleted=$((deleted + 1))
            fi
          done
          echo "Gelöscht: $deleted Runs"
