# Bei einem vX.Y.Z-Tag auf Prod deployen.
#
# Pipeline:
#   resolve → validiert das Tag-Format (kein Ref-/Shell-Injection-Vektor)
#   gate    → spiegelt .githooks/pre-push (go vet/test/lint, pnpm build/test/lint)
#   backup  → Snapshot der Prod-SQLite per `sqlite3 .backup` auf dem VPS
#   deploy  → `make deploy` (rsync + systemctl restart + migrate up)
#
# Concurrency: nur ein Prod-Deploy gleichzeitig (zwei parallele Tag-Pushes
# würden sonst um Binary, /etc/teamwerk/env und systemctl-restart kämpfen).
name: deploy

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag, der deployt werden soll (z. B. v1.2.3)'
        required: true

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  GO_VERSION: '1.26.0'
  NODE_VERSION: '22'
  PNPM_VERSION: '9'

jobs:
  # Validiert das Tag genau einmal und stellt es allen Folgejobs als
  # vertrauenswürdigen Output bereit. Verhindert, dass workflow_dispatch-Input
  # ungeprüft in `ref:` oder Shell-Strings landet.
  resolve:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - id: resolve
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          TAG="${INPUT_TAG:-$REF_NAME}"
          if ! printf '%s' "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Ungültiges Tag-Format: '$TAG' (erwartet vMAJOR.MINOR.PATCH)"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  gate:
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.tag }}
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - run: pnpm -C web install --frozen-lockfile

      # Frontend zuerst bauen: vite schreibt nach cmd/teamwerk/web/dist/
      # (gitignored). //go:embed all:web/dist braucht das Verzeichnis, sonst
      # schlagen go vet/test mit "pattern all:web/dist: no matching files" fehl.
      - run: pnpm -C web build

      - run: go vet ./...
      - run: go test -race ./...

      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2

      - run: pnpm -C web test
      - run: pnpm -C web lint

  backup:
    needs: [resolve, gate]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: SSH-Key + known_hosts einrichten
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Prod-DB auf VPS sichern (sqlite3 .backup)
        env:
          REMOTE: ${{ secrets.DEPLOY_REMOTE }}
          TAG: ${{ needs.resolve.outputs.tag }}
          DB_PATH: ${{ vars.DEPLOY_DB_PATH || '/var/lib/teamwerk/teamwerk.db' }}
          BACKUP_DIR: ${{ vars.DEPLOY_BACKUP_DIR || '/var/lib/teamwerk/backups' }}
        run: |
          set -euo pipefail
          STAMP=$(date -u +%Y%m%dT%H%M%SZ)
          BACKUP="${BACKUP_DIR}/pre-deploy-${TAG}-${STAMP}.db"
          ssh -o BatchMode=yes "$REMOTE" "
            set -euo pipefail
            sudo mkdir -p '${BACKUP_DIR}'
            sudo sqlite3 '${DB_PATH}' \".backup '${BACKUP}'\"
            sudo ls -lh '${BACKUP}'
          "
          echo "Backup angelegt: ${BACKUP}"

  deploy:
    needs: [resolve, gate, backup]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.tag }}
          fetch-depth: 0  # make build/gen-changelog.py liest die Git-Historie

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - run: pnpm -C web install --frozen-lockfile

      - name: SSH-Key + known_hosts einrichten
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: REMOTE/REMOTE_DIR für make in .env schreiben
        env:
          REMOTE: ${{ secrets.DEPLOY_REMOTE }}
          REMOTE_DIR: ${{ vars.DEPLOY_REMOTE_DIR || '/usr/local/bin' }}
        run: |
          set -euo pipefail
          : > .env
          printf 'REMOTE=%s\nREMOTE_DIR=%s\n' "$REMOTE" "$REMOTE_DIR" >> .env

      - name: Deploy (make deploy)
        env:
          TAG: ${{ needs.resolve.outputs.tag }}
        run: |
          set -euo pipefail
          echo "Deploye Tag: $TAG ($(git rev-parse --short HEAD))"
          make deploy

      - name: Smoke-Check /api/healthz
        if: vars.HEALTHZ_URL != ''
        env:
          HEALTHZ_URL: ${{ vars.HEALTHZ_URL }}
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$HEALTHZ_URL" || echo 000)
            echo "Versuch $i: HTTP $code"
            [ "$code" = "200" ] && exit 0
            sleep 3
          done
          echo "::error::healthz nach Deploy nicht 200" && exit 1
