# Pull-Request- und main-Push-Gate. Spiegelt den gate-Job aus deploy.yml
# und .githooks/pre-push (go vet/test, golangci-lint, pnpm build/test/lint).
# Wird u.a. von Dependabot-PRs zur Validierung benutzt.
#
# Race-Detector läuft hier bewusst NICHT (siehe docs/agent/08-verification.md):
# konsistent mit pre-push, separater make-Target `test-race` für gezielte
# Auditierung heikler nebenläufiger Bereiche.
name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.26.0'
  NODE_VERSION: '22'
  PNPM_VERSION: '9'

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - run: pnpm -C web install --frozen-lockfile

      # libxml2-utils (xmllint) fürs SEPA-XSD-Gate in sepaXml.xsd.test.ts.
      # Ohne xmllint würde der Test skippen und schema-brüchige Änderungen am
      # SEPA-Generator (web/src/lib/sepaXml.ts) unbemerkt durch das Gate rutschen.
      - run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      # Frontend zuerst bauen: vite schreibt nach cmd/teamwerk/web/dist/
      # (gitignored). //go:embed all:web/dist braucht das Verzeichnis, sonst
      # schlagen go vet/test mit "pattern all:web/dist: no matching files" fehl.
      - run: pnpm -C web build

      - run: go vet ./...
      - run: go test ./...

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

      # TEAMWERK_REQUIRE_XSD=1 verhindert, dass sepaXml.xsd.test.ts still
      # skippt, wenn xmllint fehlt — hart failen, damit ein kaputtes
      # libxml2-Runner-Image das Gate nicht zur No-Op macht.
      - run: pnpm -C web test
        env:
          TEAMWERK_REQUIRE_XSD: '1'

      - run: pnpm -C web lint
