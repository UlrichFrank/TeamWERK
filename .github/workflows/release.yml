# Bei jedem Push auf main: nächste Semver-Version aus Conventional Commits
# ableiten, Tag erstellen + pushen, GitHub-Release mit Changelog anlegen.
# Das vX.Y.Z-Tag triggert anschließend den Deploy-Workflow (deploy.yml).
name: release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_version:
        description: 'Tag manuell setzen (z. B. v1.2.3). Leer = automatisch aus Commits.'
        required: false
        default: ''

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Nächste Version ermitteln
        id: next
        env:
          FORCE: ${{ inputs.force_version }}
        run: |
          set -euo pipefail
          chmod +x scripts/next-version.sh
          LAST=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1 || true)
          if [ -n "$FORCE" ]; then
            if ! printf '%s' "$FORCE" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::force_version='$FORCE' ist kein gültiges vMAJOR.MINOR.PATCH"
              exit 1
            fi
            NEXT="$FORCE"
          else
            NEXT=$(scripts/next-version.sh)
          fi
          echo "Letztes Tag : ${LAST:-<keins>}"
          echo "Nächstes Tag: $NEXT"
          if [ -n "$LAST" ] && [ "$NEXT" = "$LAST" ]; then
            echo "Keine release-relevanten Commits (feat/fix/perf/!:) seit $LAST — übersprungen."
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "last=$LAST" >> "$GITHUB_OUTPUT"
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Changelog generieren
        if: steps.next.outputs.created == 'true'
        id: changelog
        env:
          VERSION: ${{ steps.next.outputs.version }}
          LAST: ${{ steps.next.outputs.last }}
        run: |
          set -euo pipefail
          if [ -z "$LAST" ]; then RANGE="HEAD"; else RANGE="${LAST}..HEAD"; fi
          {
            echo "## Änderungen seit ${LAST:-Beginn}"
            echo
            git log "$RANGE" --no-merges --pretty=format:'- %s' \
              | grep -E '^- (feat|fix|perf|refactor)(\([^)]+\))?!?:' || echo "- (keine release-relevanten Commits)"
          } > /tmp/CHANGELOG.md
          {
            echo 'body<<RELEASE_BODY_EOF'
            cat /tmp/CHANGELOG.md
            echo 'RELEASE_BODY_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Tag erstellen + pushen
        if: steps.next.outputs.created == 'true'
        env:
          VERSION: ${{ steps.next.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

      - name: GitHub-Release anlegen
        if: steps.next.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.next.outputs.version }}
          BODY: ${{ steps.changelog.outputs.body }}
        run: gh release create "$VERSION" --title "$VERSION" --notes "$BODY"
