# Code-Metrics Schwellwerte für `make metrics-gate`.
#
# Ratchet-Prinzip (siehe openspec/code-metrics-target Design D5): Startwerte
# knapp oberhalb des Ist-Zustands beim ersten Lauf, damit das Gate sofort grün
# ist und Regression fängt. Bei Verbesserung Werte enger ziehen.
#
# Schwellwerte mit Wert -1 oder fehlend werden NICHT geprüft.
# Format: einfache `key: zahl`-Paare. Kommentare hinter `#` erlaubt.

# Maximalwerte (Verstoß = "höher als …")
# Re-baseline (refactor-members-import, Welle 3): der Extract von members.Import
# (gocognit 182→60) senkt die Pro-Funktion-Komplexität drastisch, erhöht aber durch
# Zerlegung die ANZAHL Funktionen über der Rohschwelle (Import + buildMemberUpdate
# statt nur Import). Bewusst re-baselined 12→14 / 35→38 für einen reviewten,
# verhaltenserhaltenden Refactor (127 Charakterisierungstests grün). Bei weiterer
# Zerlegung wieder enger ziehen.
gocyclo_max:            14   # Funktionen mit zyklomatischer Komplexität > 15
gocognit_max:           38   # Funktionen mit kognitiver Komplexität > 20
funlen_max:              8   # Funktionen länger als 100 Zeilen / 60 Statements
dupl_go_max:             4   # duplizierte Go-Blöcke (dupl)
dupl_frontend_max_pct:   5.0 # max. Anteil duplizierter Frontend-Zeilen (jscpd)
lint_issues_max:         5   # Gesamt-Issues aus Haupt-.golangci.yml

# Minimalwerte (Verstoß = "kleiner als …")
go_coverage_min_pct:        38.0  # Go-Testabdeckung
frontend_coverage_min_pct:  15.0  # Frontend-Testabdeckung (vitest)
